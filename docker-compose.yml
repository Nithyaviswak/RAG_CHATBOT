services:
  backend:
    build: ./backend
    container_name: rag-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: rag-frontend
    ports:
      - "3000:80"
    environment:
      API_BASE: http://localhost:5000/api
    depends_on:
      - backend
